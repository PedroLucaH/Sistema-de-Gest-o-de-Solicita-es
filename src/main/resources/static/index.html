<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Painel de Gestão de Pagamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-wallet2 me-2"></i> SGS - Painel Administrativo
        </a>
        <a href="cadastro.html" class="btn btn-success btn-sm">
            <i class="bi bi-plus-circle me-1"></i> Nova Solicitação
        </a>
    </div>
</nav>

<div class="container mb-5">

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-bold text-secondary">
            <i class="bi bi-funnel me-1"></i> Filtros de Administração e Consulta
        </div>
        <div class="card-body">
            <form id="formFiltros" class="row g-3">
                <div class="col-md-3">
                    <label for="filtroStatus" class="form-label small fw-bold">Status</label>
                    <select id="filtroStatus" class="form-select">
                        <option value="">Todos os Status</option>
                        <option value="SOLICITADO">SOLICITADO</option>
                        <option value="ANALISE">ANALISE</option>
                        <option value="APROVADO">APROVADO</option>
                        <option value="REJEITADO">REJEITADO</option>
                        <option value="CANCELADO">CANCELADO</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="filtroCategoria" class="form-label small fw-bold">Categoria</label>
                    <select id="filtroCategoria" class="form-select">
                        <option value="">Todas as Categorias</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="filtroDataInicio" class="form-label small fw-bold">Data Início</label>
                    <input type="date" id="filtroDataInicio" class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="filtroDataFim" class="form-label small fw-bold">Data Fim</label>
                    <input type="date" id="filtroDataFim" class="form-control">
                </div>
                <div class="col-12 text-end mt-3">
                    <button type="button" id="btnFiltrar" class="btn btn-primary px-4">
                        <i class="bi bi-search me-1"></i> Filtrar Consultas
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>Solicitante</th>
                    <th>Categoria</th>
                    <th>Status</th>
                    <th>Valor</th>
                    <th>Data</th>
                    <th class="text-center" style="width: 220px;">Ações</th>
                </tr>
                </thead>
                <tbody id="conteudoTabela">
                <tr>
                    <td colspan="7" class="text-center py-4 text-muted">
                        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                        Carregando solicitações do sistema...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
