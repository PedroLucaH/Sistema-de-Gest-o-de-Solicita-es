<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Detalhes Administrativos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
            <span class="navbar-brand">
                <i class="bi bi-sliders me-2"></i> SGS - Workflow e Gestão Administrativa
            </span>
        <a href="index.html" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Voltar à Listagem
        </a>
    </div>
</nav>

<div class="container" style="max-width: 800px; margin-bottom: 50px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0 fw-bold">
                Detalhamento da Solicitação N° #<span id="detalheId">...</span>
            </h5>
            <span id="detalheStatus" class="badge fs-6 shadow-sm">...</span>
        </div>

        <div class="card-body p-4 bg-white">
            <div class="row g-3 mb-4">
                <div class="col-md-6 border-bottom pb-2">
                    <label class="fw-bold text-secondary small text-uppercase">Solicitante</label>
                    <p id="detalheSolicitante" class="fs-5 fw-bold text-dark mb-0">...</p>
                </div>
                <div class="col-md-6 border-bottom pb-2">
                    <label class="fw-bold text-secondary small text-uppercase">CPF / CNPJ</label>
                    <p id="detalheDocumento" class="fs-5 text-dark mb-0">...</p>
                </div>
                <div class="col-md-6 border-bottom pb-2">
                    <label class="fw-bold text-secondary small text-uppercase">Categoria do Gasto</label>
                    <p id="detalheCategoria" class="fs-5 text-dark mb-0">...</p>
                </div>
                <div class="col-md-6 border-bottom pb-2">
                    <label class="fw-bold text-secondary small text-uppercase">Data de Abertura</label>
                    <p id="detalheData" class="fs-6 text-dark mb-0">...</p>
                </div>
                <div class="col-12 border-bottom pb-2">
                    <label class="fw-bold text-secondary small text-uppercase">Valor Solicitado</label>
                    <p id="detalheValor" class="fs-3 text-success fw-bold mb-0">R$ 0,00</p>
                </div>
                <div class="col-12">
                    <label class="fw-bold text-secondary small text-uppercase mb-2">Descrição / Justificativa</label>
                    <div id="detalheDescricao" class="border p-3 bg-light rounded text-dark" style="min-height: 80px; white-space: pre-wrap;">...</div>
                </div>
            </div>

            <hr class="my-4 text-muted">

            <div class="p-3 bg-light rounded border">
                <h6 class="fw-bold text-dark mb-3">
                    <i class="bi bi-gear-wide-connected text-primary me-2"></i>Ações Disponíveis de Transição
                </h6>
                <div id="containerAcoes" class="d-flex gap-2">
                    <span class="text-muted small">Carregando ações permitidas...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
